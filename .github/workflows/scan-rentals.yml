name: Scan MV Rentals

on:
  # Run on schedule (every day at 6 AM and 6 PM EST)
  schedule:
    - cron: '0 11 * * *'  # 6 AM EST (11 UTC)
    - cron: '0 23 * * *'  # 6 PM EST (23 UTC)

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to scrape'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - weneedavacation
          - mvvacationrentals
          - mvrentals
      notify:
        description: 'Send email notification'
        required: false
        default: true
        type: boolean

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scanner/package.json

      - name: Install dependencies
        working-directory: scanner
        run: npm ci

      - name: Install Playwright browsers
        working-directory: scanner
        run: npx playwright install chromium --with-deps

      - name: Run scanner
        working-directory: scanner
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          HEADLESS: 'true'
          REQUEST_DELAY_MS: '3000'
        run: |
          npm run scan -- \
            --source ${{ github.event.inputs.source || 'all' }} \
            ${{ github.event.inputs.notify == 'true' && '--notify' || '' }}

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: Scan results $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results
          path: |
            scanner/data/homes.json
            homes.json
          retention-days: 7
