<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlanta Neighborhoods | An Orientation Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="" />

    <!-- Google Fonts: Montserrat Alternates & Quicksand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@300;400;500;700&family=Quicksand:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-content">
                <h1>Atlanta Neighborhoods</h1>
                <p class="subtitle">An Orientation Map for Our Family</p>
            </div>
            <div class="header-actions">
                <button id="btn-print" class="btn btn-secondary" title="Print-friendly view">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
                        <rect x="6" y="14" width="12" height="8"/>
                    </svg>
                    Print
                </button>
            </div>
        </header>

        <!-- Map Container -->
        <main id="map-container">
            <div id="map"></div>

            <!-- Legend Panel -->
            <div id="legend" class="panel">
                <h3>Legend</h3>
                <div class="legend-items">
                    <div class="legend-item">
                        <span class="legend-symbol home-star">★</span>
                        <span class="legend-label">Home (640 Irwin St)</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-line beltline"></span>
                        <span class="legend-label">Atlanta BeltLine</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-swatch park"></span>
                        <span class="legend-label">Parks & Greenspace</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-symbol landmark">●</span>
                        <span class="legend-label">Cultural Landmark</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-swatch neighborhood"></span>
                        <span class="legend-label">Neighborhood</span>
                    </div>
                </div>
                <div class="north-arrow">
                    <svg width="40" height="50" viewBox="0 0 40 50">
                        <polygon points="20,0 30,40 20,32 10,40" fill="#666" stroke="#333" stroke-width="1"/>
                        <text x="20" y="48" text-anchor="middle" font-size="12" font-family="Montserrat Alternates" fill="#333">N</text>
                    </svg>
                </div>
            </div>

            <!-- Info Panel -->
            <div id="info-panel" class="panel hidden">
                <button id="close-info" class="close-btn">&times;</button>
                <div id="info-content"></div>
            </div>
        </main>

        <!-- Layer Controls -->
        <aside id="layer-controls" class="panel">
            <h3>Layers</h3>
            <div class="layer-toggles">
                <label class="layer-toggle">
                    <input type="checkbox" id="layer-neighborhoods" checked>
                    <span class="toggle-label">Neighborhoods</span>
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" id="layer-parks" checked>
                    <span class="toggle-label">Parks</span>
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" id="layer-beltline" checked>
                    <span class="toggle-label">BeltLine</span>
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" id="layer-landmarks" checked>
                    <span class="toggle-label">Landmarks</span>
                </label>
            </div>
            <hr>
            <div class="zoom-controls">
                <button id="zoom-home" class="btn btn-small" title="Go to home">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                    </svg>
                    Home
                </button>
                <button id="zoom-fit" class="btn btn-small" title="Fit all">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                    </svg>
                    Fit All
                </button>
            </div>
        </aside>

        <!-- Loading Overlay -->
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <p>Loading map data...</p>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>

    <!-- Map Configuration -->
    <script src="js/config.js"></script>

    <!-- Map Application -->
    <script src="js/map.js"></script>
</body>
</html>
